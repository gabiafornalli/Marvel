<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Capitã Marvel - Pop-Out Controlado</title>
    <style>
        /* Configuração do fundo externo (fora do retângulo) */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5; /* Cinza claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* O Retângulo Principal (Container do Card) */
        .card-container {
            width: 700px;
            height: 450px;
            background: linear-gradient(45deg, #d41e31, #491f8f);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: flex-end; 
            justify-content: space-between; /* MODIFICADO: Garante separação total entre texto e imagem */
            padding: 30px;
            box-sizing: border-box;
            transition: all 0.5s ease-in-out;
            position: relative; 
        }

        /* Container do Texto e Botão (Lado Esquerdo) */
        .left-content {
            max-width: 0;
            opacity: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            transition: max-width 0.6s ease-in-out, opacity 0.4s ease-in-out;
            overflow: hidden; 
            box-sizing: border-box;
            z-index: 1; 
        }

        /* Título */
        .left-content h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #fcd116; 
            padding-bottom: 5px;
            width: fit-content;
        }

        /* Parágrafos de introdução */
        .left-content p {
            font-size: 1rem;
            line-height: 1.6;
            margin: 8px 0;
            color: white;
        }

        .left-content strong {
            color: #fcd116;
        }

        /* --- O BOTÃO ALTERADO --- */
        .saiba-mais-btn {
            background-color: #fcd116; 
            color: #1a1a1a;
            border: none;
            padding: 8px 26px;        
            border-radius: 50px;       
            font-size: 0.8rem;         
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            display: inline-block;
            margin-top: auto; 
            margin-bottom: 10px; 
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            letter-spacing: 0.5px;     
        }

        /* Efeito de hover no próprio botão */
        .saiba-mais-btn:hover {
            background-color: #ffeb3b; 
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(252, 209, 22, 0.6); 
        }

        /* Imagem da Capitã Marvel */
        .character-img {
            height: auto;
            max-height: 100%; /* Mantém a imagem dentro da altura do card inicialmente */
            object-fit: contain;
            transition: transform 0.6s ease-in-out, filter 0.5s ease-in-out;
            pointer-events: none; 
            position: absolute; 
            bottom: 0; /* Trava a base da imagem rigidamente no fundo do card */
            right: 30px; 
            transform: scale(1); 
            transform-origin: bottom center; /* NOVO: Faz o zoom crescer a partir da base (a base não mexe!) */
            z-index: 2; 
        }

        /* --- EFEITO AO PASSAR O MOUSE NO RETÂNGULO --- */
        .card-container:hover .left-content {
            max-width: 50%; /* Limita o texto em 50% para nunca bater na imagem */
            opacity: 1;
            margin-right: 20px;
        }

        /* O EFEITO POP-OUT RESTRITO */
        .card-container:hover .character-img {
            transform: scale(1.25); /* Aumenta a imagem. Como a origem é o 'bottom', ela só expande para cima e pros lados */
            filter: drop-shadow(0 -10px 15px rgba(0, 0, 0, 0.3)); /* Sombra focada no topo para destacar a saída */
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="left-content">
            <h2>Capitã Marvel</h2>
            <p><strong>Nome Real:</strong> Carol Danvers</p>
            <p>A mais poderosa Vingadora e uma das heroínas mais emblemáticas da Marvel. Uma ex-piloto de testes da Força Aérea dos EUA cuja vida mudou para sempre ao absorver a energia de uma jóia do infinito.</p>
            
            <a href="https://www.marvel.com/articles/comics/everything-you-need-to-know-about-carol-danvers" class="saiba-mais-btn">SAIBA MAIS</a>
        </div>

        <img src="1 (1).png" alt="Capitã Marvel" class="character-img">
    </div>

</body>
</html>
